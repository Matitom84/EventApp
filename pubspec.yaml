name: application_p
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Authentification et base de données en ligne
  supabase_flutter: ^2.3.4

  # Base de données locale (mode hors connexion)
  sqflite: ^2.3.2
  path: ^1.9.0

  # Appels HTTP pour les API Ticketmaster et Eventbrite
  http: ^1.2.1

  # Stockage sécurisé des clés API
  flutter_secure_storage: ^9.0.0

  # Vérifier si l'utilisateur a internet ou non
  connectivity_plus: ^7.1.1

  # Détecter la position de l'utilisateur automatiquement
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
sqflite_common_ffi_web: ^0.4.5+2
sqflite_common_ffi: ^2.3.3
flutter:
  uses-material-design: true